version: '3.8'
services:
  postgres:
    image: postgres:15-alpine
    container_name: parksense-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: parksense
    volumes:
      - pgdata:/var/lib/postgresql/data
  redis:
    image: redis:7-alpine
    container_name: parksense-redis
    ports:
      - "6379:6379"
volumes:
  pgdata:
