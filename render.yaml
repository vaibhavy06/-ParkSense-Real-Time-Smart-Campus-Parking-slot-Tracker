services:
  - type: web
    name: parksense-backend
    env: node
    rootDir: server
    buildCommand: npm run build
    startCommand: npm start
    disk:
      name: sqlite-data
      mountPath: /var/data
      sizeGB: 1
    envVars:
      - key: JWT_SECRET
        generateValue: true
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        value: file:/var/data/dev.db
